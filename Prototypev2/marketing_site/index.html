<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=1280">
<title>Arda · Sovereign AI for regulated enterprise</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="Header.jsx"></script>
  <script type="text/babel" src="WormDiagram.jsx"></script>
  <script type="text/babel" src="Hero.jsx"></script>
  <script type="text/babel" src="OwnOperateGovern.jsx"></script>
  <script type="text/babel" src="BoundaryDiagram.jsx"></script>
  <script type="text/babel" src="ThreeBarriers.jsx"></script>
  <script type="text/babel" src="StatsBand.jsx"></script>
  <script type="text/babel" src="CTASection.jsx"></script>
  <script type="text/babel" src="Footer.jsx"></script>

  <script type="text/babel">
    function App() {
      const [theme, setTheme]     = React.useState("dark");
      const [variant, setVariant] = React.useState("energy");
      React.useEffect(() => {
        document.documentElement.dataset.theme = theme;
        document.body.dataset.theme = theme;
      }, [theme]);
      return (
        <>
          <Header theme={theme} onTheme={setTheme} />
          <main>
            <Hero variant={variant} onVariant={setVariant} />
            <OwnOperateGovern />
            <BoundaryDiagram />
            <StatsBand />
            <ThreeBarriers />
            <CTASection />
          </main>
          <Footer />
        </>
      );
    }
    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
