<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  body { background: var(--bg-surface-light); }
  .card { padding: 30px 24px; }
  .lbl { font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase; font-weight: 700; color: var(--fg-on-light-muted); margin: 0 0 14px; }
  .row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 22px; margin-bottom: 28px; }
  .box {
    background: #fff;
    border: 1px solid var(--rule-on-light);
    border-radius: 10px;
    height: 84px;
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-mono); font-size: 12px; color: var(--fg-on-light-muted);
  }
  .sm { box-shadow: 0 1px 2px rgba(15,23,42,0.06), 0 1px 1px rgba(15,23,42,0.04); }
  .md { box-shadow: 0 4px 12px rgba(15,23,42,0.08), 0 1px 2px rgba(15,23,42,0.04); }
  .lg { box-shadow: 0 12px 32px rgba(15,23,42,0.12), 0 2px 6px rgba(15,23,42,0.05); }

  .dark { background: var(--bg-canvas-dark); padding: 30px 24px; border-radius: 10px; }
  .row.dk { grid-template-columns: repeat(3, 1fr); gap: 22px; margin: 0; }
  .lvl {
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 10px;
    height: 84px;
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-mono); font-size: 12px; color: var(--arda-slate-200);
  }
  .lvl-800 { background: var(--bg-surface-dark); }
  .lvl-700 { background: var(--bg-raised-dark); }
  .lvl-600 { background: var(--bg-card-dark); }
  .lbl-on-dark { color: var(--arda-slate-300); }
</style></head>
<body>
  <div class="card">
    <div class="lbl">Shadows · light surfaces only</div>
    <div class="row">
      <div class="box sm">shadow-sm</div>
      <div class="box md">shadow-md · default card</div>
      <div class="box lg">shadow-lg · modal</div>
    </div>
    <div class="lbl">On dark · lift via surface step (no shadow, no glow)</div>
    <div class="dark">
      <div class="row dk">
        <div class="lvl lvl-800">surface · 800</div>
        <div class="lvl lvl-700">raised · 700</div>
        <div class="lvl lvl-600">card · 600</div>
      </div>
    </div>
  </div>
</body></html>
