<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  body { background: var(--bg-canvas-dark); color: var(--fg-on-dark); }
  .row { display: grid; grid-template-columns: 110px 1fr; align-items: baseline; gap: 18px; padding: 10px 0; border-bottom: 1px solid var(--rule-on-dark); }
  .row:last-child { border: 0; }
  .lab { font-family: var(--font-mono); font-size: 11px; color: var(--fg-on-dark-faint); padding-top: 6px; }
  .lab b { display:block; color: var(--fg-on-dark-muted); font-family: var(--font-body); font-weight: 700; font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase; margin-bottom: 2px; }
  .spec { font-family: var(--font-display); font-weight: 700; line-height: 1.05; letter-spacing: -0.02em; color: var(--fg-on-dark); }
  .meta { font-family: var(--font-body); color: var(--fg-on-dark-muted); font-size: 12px; letter-spacing: 0.16em; text-transform: uppercase; font-weight: 700; padding: 0 0 12px; }
</style></head>
<body>
  <div class="card">
    <div class="meta">Pathway Extreme · 700 · Display</div>
    <div class="row"><div class="lab"><b>Display</b>84 / -2%</div><div class="spec" style="font-size:84px">Sovereign by design</div></div>
    <div class="row"><div class="lab"><b>H1</b>64 / -1.5%</div><div class="spec" style="font-size:64px">AI you defend to your regulator</div></div>
    <div class="row"><div class="lab"><b>H2</b>48 / -1.5%</div><div class="spec" style="font-size:48px">Own. Operate. Govern.</div></div>
    <div class="row"><div class="lab"><b>H3</b>36 / -1.5%</div><div class="spec" style="font-size:36px">Inside your trust boundary</div></div>
    <div class="row"><div class="lab"><b>H4</b>28 / -1.5%</div><div class="spec" style="font-size:28px">No data egress. Ever.</div></div>
  </div>
</body></html>
