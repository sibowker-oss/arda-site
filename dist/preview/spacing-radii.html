<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  body { background: #fff; }
  .card { padding: 24px; }
  .lbl { font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase; font-weight: 700; color: var(--fg-on-light-muted); margin: 0 0 12px; }
  .row { display: flex; gap: 14px; align-items: flex-end; margin-bottom: 24px; }
  .step { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .bar { background: var(--arda-lime-500); height: 10px; border-radius: 2px; }
  .step .name { font-family: var(--font-mono); font-size: 11px; color: var(--fg-on-light-muted); }
  .step .px { font-size: 10px; color: var(--fg-on-light-faint); }

  .row2 { display: flex; gap: 18px; align-items: center; }
  .rad { width: 64px; height: 64px; background: var(--bg-canvas-dark); border: 1px solid var(--rule-on-light); display: flex; align-items: center; justify-content: center; }
  .rad span { font-family: var(--font-mono); font-size: 11px; color: #fff; }
</style></head>
<body>
  <div class="card">
    <div class="lbl">Spacing scale · 4px base</div>
    <div class="row">
      <div class="step"><div class="bar" style="width:4px"></div><span class="name">--s-1</span><span class="px">4</span></div>
      <div class="step"><div class="bar" style="width:8px"></div><span class="name">--s-2</span><span class="px">8</span></div>
      <div class="step"><div class="bar" style="width:12px"></div><span class="name">--s-3</span><span class="px">12</span></div>
      <div class="step"><div class="bar" style="width:16px"></div><span class="name">--s-4</span><span class="px">16</span></div>
      <div class="step"><div class="bar" style="width:24px"></div><span class="name">--s-6</span><span class="px">24</span></div>
      <div class="step"><div class="bar" style="width:32px"></div><span class="name">--s-8</span><span class="px">32</span></div>
      <div class="step"><div class="bar" style="width:48px"></div><span class="name">--s-12</span><span class="px">48</span></div>
      <div class="step"><div class="bar" style="width:64px"></div><span class="name">--s-16</span><span class="px">64</span></div>
      <div class="step"><div class="bar" style="width:96px"></div><span class="name">--s-24</span><span class="px">96</span></div>
    </div>
    <div class="lbl">Radius · low and architectural</div>
    <div class="row2">
      <div class="rad" style="border-radius:2px"><span>2 · xs</span></div>
      <div class="rad" style="border-radius:4px"><span>4 · sm</span></div>
      <div class="rad" style="border-radius:6px"><span>6 · md</span></div>
      <div class="rad" style="border-radius:10px"><span>10 · lg</span></div>
      <div class="rad" style="border-radius:14px"><span>14 · xl</span></div>
      <div class="rad" style="border-radius:999px;width:120px"><span>pill · tags only</span></div>
    </div>
  </div>
</body></html>
