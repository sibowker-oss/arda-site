<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  body { background: var(--bg-canvas-dark); color: var(--fg-on-dark); }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0; }
  .stat { padding: 18px 16px; border-right: 1px solid var(--rule-on-dark); }
  .stat:last-child { border-right: 0; }
  .num { font-family: var(--font-display); font-weight: 700; font-size: 64px; line-height: 1; letter-spacing: -0.03em; color: var(--arda-lime-400); }
  .num small { font-size: 32px; color: var(--fg-on-dark-muted); font-weight: 700; }
  .lab { margin-top: 10px; font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase; font-weight: 700; color: var(--fg-on-dark-muted); line-height: 1.3; }
</style></head>
<body>
  <div class="card">
    <div class="grid">
      <div class="stat"><div class="num">~18<small>×</small></div><div class="lab">Token growth<br>by 2030</div></div>
      <div class="stat"><div class="num">5–30<small>×</small></div><div class="lab">More tokens per<br>agentic task</div></div>
      <div class="stat"><div class="num">33<small>%</small></div><div class="lab">Enterprise apps<br>agentic by 2028</div></div>
      <div class="stat"><div class="num">>40<small>%</small></div><div class="lab">Cloud AI projects<br>cancelled by 2027</div></div>
    </div>
  </div>
</body></html>
