<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  body { background: var(--bg-canvas-dark); color: var(--fg-on-dark); }
  .card { padding: 0; }
  .nav {
    display: flex; align-items: center; gap: 32px;
    padding: 18px 28px;
    border-bottom: 1px solid var(--rule-on-dark);
  }
  .brand { display: flex; align-items: center; gap: 10px; }
  .brand img { width: 26px; height: 26px; }
  .brand b { font-family: var(--font-display); font-weight: 700; letter-spacing: 0.16em; font-size: 18px; }
  .links { display: flex; gap: 24px; flex: 1; }
  .links a { color: var(--arda-slate-200); font-size: 14px; font-weight: 600; text-decoration: none; border: 0; transition: color 140ms; }
  .links a:hover { color: #fff; }
  .links a.active { color: #fff; }
  .actions { display: flex; gap: 10px; }
  .btn-primary {
    background: var(--arda-lime-500); color: #fff;
    font-weight: 700; font-size: 13px; padding: 8px 14px;
    border-radius: 6px; border: 0;
  }
  .btn-secondary {
    background: transparent; color: #fff;
    font-weight: 700; font-size: 13px; padding: 8px 14px;
    border-radius: 6px; border: 1px solid rgba(255,255,255,0.16);
  }

  .sub {
    padding: 10px 28px;
    font-size: 12px; letter-spacing: 0.04em;
    color: var(--arda-slate-300);
    background: var(--bg-surface-dark);
    display: flex; justify-content: space-between;
  }
  .sub b { color: #fff; }
</style></head>
<body>
  <div class="card">
    <div class="nav">
      <div class="brand"><img src="../assets/icons/arda-target.png" alt=""><b>ARDA</b></div>
      <div class="links">
        <a href="#" class="active">Platform</a>
        <a href="#">Architecture</a>
        <a href="#">Sectors</a>
        <a href="#">POV</a>
        <a href="#">Customers</a>
      </div>
      <div class="actions">
        <button class="btn-secondary">Read POV</button>
        <button class="btn-primary">Book a deep-dive</button>
      </div>
    </div>
    <div class="sub">
      <span><b>Sovereign AI</b> · for regulated enterprise</span>
      <span>SOC 2 Type II · ISO 27001 · v2026.05</span>
    </div>
  </div>
</body></html>
