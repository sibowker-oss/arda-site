<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  body { background: var(--bg-canvas-dark); color: var(--fg-on-dark); }
  .grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 14px 8px; }
  .ic { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .ic .img {
    width: 56px; height: 56px;
    object-fit: contain;
    display: block;
  }
  .ic .lab { font-size: 10px; letter-spacing: 0.04em; color: var(--fg-on-dark-muted); text-align: center; }
</style></head>
<body>
  <div class="card">
    <div class="grid" id="grid"></div>
  </div>
  <script>
    const ICONS = [
      'shield-check','lock','key','eye','audit',
      'chip','stack','globe','secure-data','sparkle',
      'alert','no-entry','badge','arda-target','citadel',
      'code','bolt','crown','wrench','contract',
      'document','user','lifebuoy','bars','trend-up'
    ];
    const grid = document.getElementById('grid');
    for (const name of ICONS) {
      const el = document.createElement('div');
      el.className = 'ic';
      el.innerHTML = `<img class="img" src="../assets/icons/${name}.png" alt=""><div class="lab">${name}</div>`;
      grid.appendChild(el);
    }
  </script>
</body></html>
