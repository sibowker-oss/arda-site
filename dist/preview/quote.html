<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  body { background: var(--bg-canvas-dark); color: var(--fg-on-dark); }
  .quote {
    padding: 26px 28px;
    border-left: 2px solid var(--arda-lime-500);
    background: var(--bg-surface-dark);
    border-radius: 0 10px 10px 0;
    position: relative;
  }
  .q-text {
    font-family: var(--font-display); font-weight: 700;
    font-size: 28px; line-height: 1.18; letter-spacing: -0.015em;
    color: #fff;
    text-wrap: balance;
  }
  .q-attr {
    margin-top: 16px; padding-top: 14px;
    border-top: 1px solid var(--rule-on-dark);
    display: flex; gap: 14px; align-items: center;
    font-size: 12px; color: var(--arda-slate-300);
    letter-spacing: 0.04em;
  }
  .q-attr b { color: #fff; font-weight: 700; }
  .src {
    margin-top: 14px;
    font-family: var(--font-mono); font-size: 11px;
    color: var(--arda-slate-400);
  }
  .src span { color: var(--arda-slate-300); }
</style></head>
<body>
  <div class="card">
    <div class="quote">
      <div class="q-text">"Could a CIO read this aloud in their next risk committee without feeling exposed?"</div>
      <div class="q-attr">
        <b>The single test</b>
        <span>·</span>
        <span>Arda Tone of Voice v1 · §4 The single test</span>
      </div>
    </div>
    <div class="src">Sources <span>·</span> Hepburn Advisory · Arda Tone of Voice v1 · 2026-05-01</div>
  </div>
</body></html>
