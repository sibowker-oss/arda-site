<!doctype html><html><head><meta charset="utf-8">
<title>Section divider</title><link rel="stylesheet" href="styles.css">
<style>
  .slide { padding: 96px 96px 80px; }
  .sec-num { font-family: var(--font-display); font-weight: 800; font-size: 480px; line-height: 0.78; letter-spacing: -0.06em; color: var(--arda-lime-500); margin: -40px 0 0 -20px; }
  .sec-rule { width: 320px; height: 6px; background: var(--arda-lime-500); margin: 32px 0 32px; border-radius: 3px; }
  .sec-eyebrow { font: 700 22px/1 var(--font-body); letter-spacing: 0.20em; text-transform: uppercase; color: var(--arda-slate-300); }
  .sec-title { font-family: var(--font-display); font-weight: 800; font-size: 124px; line-height: 0.96; letter-spacing: -0.03em; color: #fff; margin: 24px 0 0; max-width: 1400px; text-wrap: balance; }
  .sec-bottom { margin-top: auto; display: flex; justify-content: space-between; }
</style></head>
<body data-theme="dark">
<div class="slide">
  <div class="slide-header">
    <div class="s-brand"><img src="assets/arda-logo-white.png" alt="Arda" /></div>
    <span>PART · 02 of 08</span>
  </div>
  <div class="sec-num">02</div>
  <div class="sec-rule"></div>
  <div class="sec-eyebrow">Part two</div>
  <h1 class="sec-title">Inside the boundary, or outside it.</h1>
  <div class="slide-footer">
    <span>CONFIDENTIAL · ARDA × ACME</span>
    <span>02 / 08</span>
  </div>
</div>
</body></html>
