<!doctype html><html><head><meta charset="utf-8">
<title>Big quote</title><link rel="stylesheet" href="styles.css">
<style>
  .slide { padding: 96px 160px 80px; justify-content: center; }
  .quote-mark { font-family: var(--font-display); font-weight: 800; font-size: 320px; line-height: 0.6; letter-spacing: -0.05em; color: var(--arda-lime-500); margin-bottom: 24px; }
  .quote { font-family: var(--font-display); font-weight: 700; font-size: 88px; line-height: 1.08; letter-spacing: -0.025em; color: #fff; max-width: 1480px; margin: 0; text-wrap: balance; }
  .attr { margin-top: 64px; display: flex; align-items: center; gap: 20px; font-size: 22px; }
  .attr-rule { width: 64px; height: 2px; background: var(--arda-lime-500); }
  .attr b { font-family: var(--font-display); font-weight: 700; color: #fff; font-size: 24px; }
  .attr span { color: var(--arda-slate-300); }
</style></head>
<body data-theme="dark">
<div class="slide">
  <div class="slide-header">
    <div class="s-brand"><img src="assets/arda-logo-white.png" alt="Arda" /></div>
    <span>VOICE · 07 OF 08</span>
  </div>
  <div class="quote-mark" aria-hidden="true">"</div>
  <p class="quote">If your security team can't draw a box around it, your regulator can't sign off on it. We sit inside the box.</p>
  <div class="attr">
    <div class="attr-rule"></div>
    <b>The Arda thesis</b>
    <span>· Tone of Voice v1, May 2026</span>
  </div>
  <div class="slide-footer">
    <span>CONFIDENTIAL · ARDA × ACME</span>
    <span>07 / 08</span>
  </div>
</div>
</body></html>
