<!doctype html><html><head><meta charset="utf-8">
<title>Cover</title><link rel="stylesheet" href="styles.css">
<style>
  .slide { padding: 0; justify-content: center; align-items: flex-start; padding-left: 160px; }
  .cover-mark { display: block; height: 88px; margin-bottom: 56px; }
  .cover-mark img { display: block; height: 100%; width: auto; }
  .cover-display { font-family: var(--font-display); font-weight: 800; font-size: 240px; line-height: 0.92; letter-spacing: -0.04em; color: #fff; margin: 0; }
  .cover-display em { font-style: normal; color: var(--arda-lime-500); }
  .cover-display b { font-weight: 800; color: var(--arda-lime-500); }
  .cover-rule { width: 240px; height: 6px; background: var(--arda-lime-500); border-radius: 3px; margin-top: 32px; }
  .cover-sub { margin-top: 48px; font-size: 32px; line-height: 1.4; max-width: 1200px; color: var(--arda-slate-200); }
  .cover-credit {
    position: absolute; bottom: 56px; left: 160px; right: 96px;
    display: flex; justify-content: space-between;
    font: 14px/1 var(--font-mono); letter-spacing: 0.06em; color: var(--arda-slate-400);
  }
  .cover-credit b { color: var(--arda-slate-200); font-weight: 700; }
</style></head>
<body data-theme="dark">
<div class="slide">
  <div class="cover-mark"><img src="assets/arda-logo-white.png" alt="Arda" /></div>
  <h1 class="cover-display">AI you can defend<br/><em>to your regulator.</em></h1>
  <div class="cover-rule"></div>
  <p class="cover-sub">Sovereign AI for regulated enterprise. Own. Operate. Govern.</p>
  <div class="cover-credit">
    <span><b>Arda × ACME</b> · First-call deck · v2026.05</span>
    <span>CONFIDENTIAL · MAY 2026</span>
  </div>
</div>
</body></html>
